<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="120" height="120" fill="#0a0a0f" rx="12"/>
  <g filter="url(#glow)">
    <!-- connection lines -->
    <g stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3">
      <line x1="60" y1="30" x2="30" y2="50"/>
      <line x1="60" y1="30" x2="90" y2="50"/>
      <line x1="60" y1="30" x2="60" y2="70"/>
      <line x1="30" y1="50" x2="40" y2="85"/>
      <line x1="90" y1="50" x2="80" y2="85"/>
      <line x1="60" y1="70" x2="40" y2="85"/>
      <line x1="60" y1="70" x2="80" y2="85"/>
    </g>
    <!-- nodes -->
    <g fill="#0a0a0f" stroke="#00d4ff" stroke-width="1.5">
      <!-- center (larger) -->
      <circle cx="60" cy="30" r="8" fill="#00d4ff" fill-opacity="0.15"/>
      <circle cx="60" cy="30" r="4" fill="#00d4ff"/>
      <!-- satellites -->
      <circle cx="30" cy="50" r="5" fill="#00d4ff" fill-opacity="0.1"/>
      <circle cx="30" cy="50" r="2.5" fill="#00d4ff"/>
      <circle cx="90" cy="50" r="5" fill="#00d4ff" fill-opacity="0.1"/>
      <circle cx="90" cy="50" r="2.5" fill="#00d4ff"/>
      <circle cx="60" cy="70" r="5" fill="#00d4ff" fill-opacity="0.1"/>
      <circle cx="60" cy="70" r="2.5" fill="#00d4ff"/>
      <circle cx="40" cy="85" r="5" fill="#00d4ff" fill-opacity="0.1"/>
      <circle cx="40" cy="85" r="2.5" fill="#00d4ff"/>
      <circle cx="80" cy="85" r="5" fill="#00d4ff" fill-opacity="0.1"/>
      <circle cx="80" cy="85" r="2.5" fill="#00d4ff"/>
    </g>
    <!-- hex outline -->
    <polygon points="60,14 98,36 98,78 60,100 22,78 22,36" fill="none" stroke="#00d4ff" stroke-width="0.75" stroke-opacity="0.2"/>
  </g>
  <!-- text -->
  <text x="60" y="116" text-anchor="middle" font-family="monospace" font-size="10" fill="#00d4ff" letter-spacing="4" opacity="0.7">GUILD</text>
</svg>
